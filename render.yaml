databases:
  - name: vrp-db
    plan: free
    region: singapore

services:
  # Monolith: Django + React
  - type: web
    name: vrp-app
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vrp-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PORT
        value: "10000"
